<div class="SingleContainer">
    <!-- Header for Add Item -->
    <div class="SingleContainerHeader">
       <h2 class="text-center">{{"update item"| translate}}</h2>
    </div>
    <form #formRef="ngForm" (ngSubmit)="handleFormSubmit(formRef)">
    <div class="MALoadingContainer">
       <!-- Loading spinner overlay -->
       <div *ngIf="isLoading" class="TableLoading-overlay d-flex align-items-center justify-content-center">
          <div class="spinner-border" role="status">
             <span class="sr-only"></span>
          </div>
       </div>
       <div [ngClass]="{'TableDimmed': isLoading}">
          <!-- Error Box -->
          <div *ngIf="error" class="error-box">
             <i class="bi bi-x-circle-fill error-icon"></i>
             <div>
                <strong>{{"validationerror"| translate}}</strong>
                <ul>
                   <ul>
                      <li *ngFor="let errorMsg of errorMessages">{{ errorMsg }}</li>
                   </ul>
                </ul>
             </div>
          </div>
          <!-- Fee Group Name (EN) -->
          <div class="form-group">
             <label for="fmsCode">{{"labels.fmscode"| translate}} <span class='RedAsterisk'>*</span></label>
             <input type="text" class="form-control" id="fmsCode" name="fmsCode" [(ngModel)]="fmsCode" #fmsCodeRef="ngModel" required>
             <div *ngIf="fmsCodeRef.errors && fmsCodeRef.errors['required'] && fmsCodeRef.touched" class="error-text">
               {{"fmscodeisrequired"| translate}}
             </div>
          </div>
         
          <!-- Buttons -->
          <div class="button-group">
             <div>{{"fields with are mandatory"| translate}}</div>
             <button class="btn btnUpdate" type="submit">{{"update"| translate}}</button>
             <button class="btn btnClose" type="button" (click)="closed()">{{"close"| translate}}</button>
          </div>
       </div>
    </div>
    </form>
  </div>
