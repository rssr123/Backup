<ng-container *ngIf="permListAllow === 1">
<body class="BodyCointaner">
	<div class="PAContainer73">
		<div class="left-section73">
			<!-- <div class="LeftSectionPosition"> {{"labels.Home / Report / PG Settlement/Disbursement Listing" | translate}} </div> -->
			<h2>{{"labels.pgsettlement/disbursementlisting" | translate}}</h2>
			<form class="allFormClass" class="form-group" #formRef="ngForm" (ngSubmit)="handleFormSubmit(formRef)">
			<table>
				<tr>
					<td>
						<div class="displayColumn">
							<label>{{"labels.pgsettlementstatementdate" | translate}} <span class='RedAsterisk'>*</span></label>
							<input type="text"
							[placeholder]="'labels.daterangepicker'| translate"
							class="form-control" [bsConfig]="{ rangeInputFormat : 'DD MMM YYYY', dateInputFormat: 'DD MMM YYYY', showWeekNumbers: false ,
							rangeSeparator:' to ',containerClass:'theme-default',adaptivePosition: true, maxDateRange: 6}"
							bsDaterangepicker 
							[(ngModel)]="dateStatement"
							name="daterange" 
							(ngModelChange)="validateDateStatement()"
							(keydown)="onKeyDown($event)"
							readonly #dateStatementRef="ngModel" required onkeydown="return false">
							<div *ngIf="dateStatementRef.errors && dateStatementRef.errors['required'] && dateStatementRef.touched"
							class="error-text">
							{{"labels.pgsettlementstatementdateisrequired" | translate}}
						</div>
						<!-- <div *ngIf="isPGSettlementStatementDateInvalid()" class="error-text">
							{{ "PG Settlement Statement Date Range cannot exceed 7 days" | translate }}
						</div> -->
						</div>
					</td>
					<td>
						<div class="displayColumn">
							<label>{{"labels.pgsettlementstatementno." | translate}}</label>
							<input type="text" class="form-control" [(ngModel)]="statementNo" name="statementNo" maxlength="25">
						</div>
					</td>
					<td>
						<div class="displayColumn">
							<label>{{"labels.bankstatementtransactiondescription" | translate}}</label>
							<input type="text" class="form-control" [(ngModel)]="transDesc" name="transDesc" maxlength="50">
						</div>
					</td>
				</tr>
				<tr>
					<td></td>
					<td colspan="2">
						<div class="displayRow">
							<label>{{"labels.downloadreportas:" | translate}}</label>
							<ng-select class="form-control" [(ngModel)]="selectedFileType" name="selectedFileType"
								dropdownPosition="bottom" #selectedFileTypeRef="ngModel" required [clearable]="false">
								<ng-option *ngFor="let item of fileType"
									[value]="item.value">{{item.label}}</ng-option>
							</ng-select>
							<div *ngIf="selectedFileTypeRef.errors && selectedFileTypeRef.errors['required'] && selectedFileTypeRef.touched"
								class="error-text">
								{{"File type is required" | translate}}
							</div>
							<button class="btn btnReset" type="button" (click)="resetWithDefaults()">{{"buttons.reset" | translate}}</button>
							<button class="btn btnAdd" type="submit" [disabled]="!formRef.valid">{{"buttons.download" | translate}}</button>
						</div>
					</td>
				</tr>
			</table>
			</form>
		</div>
	</div>
</body>
</ng-container>
