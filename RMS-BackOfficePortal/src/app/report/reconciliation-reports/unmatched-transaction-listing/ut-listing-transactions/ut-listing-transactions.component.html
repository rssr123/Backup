<ng-container *ngIf="permListAllow === 1">

    <body class="BodyCointaner">
        <div class="PAContainer73">
            <div class="left-section73">

                <div *ngIf="showResultAlert" [@fadeInOut]>
                    <div class="alert alert-warning PA-alert-box" role="alert">{{"pymtcollalert" | translate}}
                    </div>
                </div>

                <!-- <div class="LeftSectionPosition">{{"labels.Home / Report / Unmatched Transaction Listing - Transactions View" | translate}}
                </div> -->
                <h2>{{"labels.Unmatched Transaction Listing - Transactions View" | translate}}</h2>

                <div>
                    <label style="font-weight: 500;">{{"date" | translate}}</label>


                    <input type="text" class="form-control" bsDatepicker
                        style="width: 140px; display: inline-block;margin-left:5px; margin-right:5px;"
                        [(ngModel)]="periodKey" name="periodKey"
                        [bsConfig]="{ dateInputFormat: 'DD MMM YYYY', showWeekNumbers:false, containerClass:'theme-default', adaptivePosition: true, maxDate: today }" >


                    <button type="button" class="btn btnAdd" (click)="apply()">{{"buttons.apply" | translate}}</button>

                </div>
                <br>

                <table>
                    <tr>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.orderreferenceno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="ornNo">
                            </div>
                        </td>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.reconciliationstatus" | translate}}</label>
                                <ng-select class="form-control" [(ngModel)]="subCriteria" dropdownPosition="bottom">
                                    <ng-option *ngFor="let item of pgReconciliationStatus"
                                        [value]="item.value">{{item.label}}</ng-option>
                                </ng-select>
                            </div>
                        </td>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.receiptno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="rcptNo">
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.pgtransactionid" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="pgTxnId">
                            </div>
                        </td>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.pgsettlementstatementno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="stmtNo">
                            </div>
                        </td>
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.showduplicatetransaction" | translate}}</label>
                                <ng-select class="form-control" dropdownPosition="bottom">
                                    <ng-option *ngFor="let item of showDuplicatedTransactions"
                                        [value]="item.value">{{item.label}}</ng-option>
                                </ng-select>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td colspan="2">
                            <div class="displayRow">
                                <label>{{"labels.downloadreportas:" | translate}}</label>

                                <ng-select class="form-control" [(ngModel)]="selectedFileType" name="selectedFileType"
                                    dropdownPosition="bottom" #selectedFileTypeRef="ngModel" required>
                                    <ng-option *ngFor="let item of fileType"
                                        [value]="item.value">{{item.label}}</ng-option>
                                </ng-select>
                                <div *ngIf="selectedFileTypeRef.errors && selectedFileTypeRef.errors['required'] && selectedFileTypeRef.touched"
                                    class="error-text">
                                    {{"File is required" | translate}}
                                </div>

                                <button class="btn btnReset" (click)="reset()">{{"buttons.reset" | translate}}</button>
                                <button class="btn btnAdd" type="submit" (click)="dlReport()">{{"buttons.generate" |
                                    translate}}</button>
                            </div>
                        </td>

                    </tr>
                </table>
            </div>
        </div>
    </body>
</ng-container>
