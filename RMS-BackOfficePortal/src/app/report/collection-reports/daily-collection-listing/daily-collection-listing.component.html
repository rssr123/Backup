<ng-container *ngIf="permListAllow === 1">
<body class="BodyCointaner">
	<div class="PAContainer73">
		<div class="left-section73">

			<!-- <div class="LeftSectionPosition"> {{"labels.Home / Report / Daily Collection Listing" | translate}} </div> -->
			<h2>{{"labels.dailyCollectionListing" | translate}}</h2>
			<form class="allFormClass" class="form-group" #formRef="ngForm" (ngSubmit)="handleFormSubmit(formRef)">
				<table>
					<tr>
						<td>
							<div class="displayColumn">
								<label>{{"labels.collectiondaterange" | translate}} <span class='RedAsterisk'>*</span></label>
								<input type="text" [placeholder]="'labels.daterangepicker'| translate" class="form-control"
									[bsConfig]="{ rangeInputFormat : 'DD MMM YYYY', dateInputFormat: 'DD MMM YYYY', showWeekNumbers: false ,
									rangeSeparator:' to ',containerClass:'theme-default',adaptivePosition: true, maxDateRange: 5}"
									bsDaterangepicker [(ngModel)]="pymtSubmitDt" name="pymtSubmitDt" 
									(ngModelChange)="validatePymtSubmitDt()"
									(keydown)="onKeyDown($event)"
									readonly
									#pymtSubmitDtRef="ngModel" required onkeydown="return false">
								<div *ngIf="pymtSubmitDtRef.errors && pymtSubmitDtRef.errors['required'] && pymtSubmitDtRef.touched"
									class="error-text">
									{{"labels.collectiondaterangeisrequired" | translate}}
								</div>
								<!-- <div *ngIf="isPaymentSubmmitedDateInvalid()" class="error-text">
									{{ "Collection Date Range cannot exceed 2 days" | translate }}
								</div> -->
							</div>
						</td>
						<td>
							<div class="displayColumn">
								<label>{{"labels.orderreferenceno." | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="ornNo" name="ornNo" maxlength="20">
							</div>
						</td>
						<td>
							<div class="displayColumn">
								<label>{{"labels.paymenttransactionid" | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="pgTransID" name="pgTransID" maxlength="30">
							</div>
						</td>
						<!-- <td>
							<div class="displayColumn">
								<label>{{"labels.rmspaymentid" | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="pgPaymentID" name="pgPaymentID" maxlength="20">
							</div>
						</td> -->
					</tr>
					<tr>
						<!-- <td>
							<div class="displayColumn">
								<label>{{"labels.pgtransactionid" | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="pgTransID" name="pgTransID" maxlength="30">
							</div>
						</td> -->
						<!-- <td>
							<div class="displayColumn">
								<label>{{"labels.pgtransactionstatus" | translate}}</label>
								<ng-select class="form-control" dropdownPosition="bottom" [(ngModel)]="pgTransStatus"
									name="pgTransStatus">
									<ng-option *ngFor="let item of pgTransactionStatus"
										[value]="item.value">{{item.label}}</ng-option>
								</ng-select>
							</div>
						</td> -->
						<td>
							<div class="displayColumn">
								<label>{{"labels.receiptno." | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="receiptNo" name="receiptNo" maxlength="20">
							</div>
						</td>
						<td>
							<div class="displayColumn">
								<label class="tableLabel">{{"labels.pgsettlementstatementno." | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="statementNo" name="statementNo" maxlength="25">
							</div>
						</td>
					</tr>
					<!-- <tr>
						<td>
							<div class="displayColumn">
								<label class="tableLabel">{{"labels.pgsettlementstatementno." | translate}}</label>
								<input type="text" class="form-control" [(ngModel)]="statementNo" name="statementNo" maxlength="25">
							</div>
						</td>
					</tr> -->
					<tr>
						<td></td>
						<td colspan="2">
							<div class="displayRow">
								<label>{{"labels.downloadreportas:" | translate}}</label>
								<ng-select class="form-control" [(ngModel)]="selectedFileType" name="selectedFileType"
									dropdownPosition="bottom" #selectedFileTypeRef="ngModel" required [clearable]="false">
									<ng-option *ngFor="let item of fileType"
										[value]="item.value">{{item.label}}</ng-option>
								</ng-select>
								<div *ngIf="selectedFileTypeRef.errors && selectedFileTypeRef.errors['required'] && selectedFileTypeRef.touched"
									class="error-text">
									{{"labels.File type is required" | translate}}
								</div>
								<button class="btn btnReset" type="button" (click)="resetWithDefaults()">{{"buttons.reset" | translate}}</button>
								<button class="btn btnAdd" type="submit" [disabled]="!formRef.valid" >{{"buttons.download" | translate}}</button>
							</div>
						</td>
					</tr>
				</table>
			</form>
		</div>

	</div>
</body>
</ng-container>
