<body class="BodyCointaner" *ngIf="permViewAllow == 1">
	<div class="PAContainer73">
		<div class="left-section73">

            <div *ngIf="showResultAlert" [@fadeInOut]>
                <div class="alert alert-warning PA-alert-box" role="alert">{{"reportgenerated." | translate}}
                </div>
            </div>

			<h2>{{"menu.otcreturnedchequereport" | translate}}</h2>
				<table>

					<!--<div class="displayColumn" style="height: 30px; margin-left: 20px;margin-top: 20px;">
                        <label>{{"labels.reportpre-filters" | translate}}</label>
					</div>-->

					<tr>
						<td>
							<div class="displayColumn form-group" id="daterange-container">
								<label for="daterange">{{"labels.cancelleddaterange" | translate}} <span class='RedAsterisk'>*</span></label>
								<input type="text" id="daterange" placeholder="" class="form-control"
								  [bsConfig]="{ rangeInputFormat : 'DD MMM YYYY', dateInputFormat: 'DD MMM YYYY', showWeekNumbers: false ,rangeSeparator:' to ',containerClass:'theme-default',adaptivePosition: true, maxDateRange: 30}"
								  bsDaterangepicker [(ngModel)]="dateRange" name="daterange" readonly onkeydown="return false">
								<div *ngIf="dateCheck()" class="error-text">
									{{"labels.invaliddaterange31" | translate}}
								</div>
							</div>
						</td>
						<td>
							<div class="displayColumn form-group" id="branchcode-container">
								<label for="branchcode">{{"labels.branchcode" | translate}}</label>
								<ng-select class="form-control" id="branchcode" [(ngModel)]="branchCode" dropdownPosition="bottom" [clearable]=true>
								  <ng-option *ngFor="let item of branches" [value]="item.bcm_code">
									{{item.bcm_code}}
								  </ng-option>
								</ng-select>
							</div>
						</td>
						<td>
							<div class="displayColumn" id="receiptno-container">
                                <label for="receiptno">{{"labels.receiptno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="receiptNo" id="receiptno">
                            </div>
						</td>
					</tr>

                    <tr>
						<td>
							<div class="displayColumn" id="chequeno-container">
                                <label for="chequeno">{{"labels.chequeno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="chequeNo" id="chequeno">
                            </div>
						</td>
						<td>
							<div class="displayColumn" id="customername-container">
                                <label for="customername">{{"labels.customername" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="customerName" id="customername">
                            </div>
						</td>
						<td>
							<div class="displayColumn" id="entityno-container">
                                <label for="entityno">{{"labels.entityno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="entityNo" id="entityno">
                            </div>
						</td>
					</tr>

                    <tr>
						<td>
							<div class="displayColumn" id="nonbillingno-container">
                                <label for="nonbillingno">{{"labels.nonbillingno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="nonBillingNo" id="nonbillingno">
                            </div>
						</td>
						<td>
							<div class="displayColumn form-group" id="nonbillingstatus-container">
								<label for="nonbillingstatus">{{"labels.nonbillingstatus" | translate}}</label>
								<ng-select class="form-control" id="nonbillingstatus" [(ngModel)]="nonBillingStatus" dropdownPosition="bottom" [clearable]=true>
									<ng-option *ngFor="let item of nonBillingStatuses" [value]="item.param_cd">
										{{item.nm_en}}
									</ng-option>
								</ng-select>
							</div>
						</td>
					</tr>

					<tr>
						<td></td>
						<td colspan="2">
							<!-- <label class="note">{{"labels.iftherearereportspendingtobegeneratedthegeneratebuttonwillbedisabled" | translate}}</label> -->
							<div class="displayRow">
								<label>{{"labels.downloadreportas:" | translate}}</label>
								<ng-select class="form-control" [(ngModel)]="selectedFileType" name="selectedFileType"
									dropdownPosition="bottom" #selectedFileTypeRef="ngModel" required [clearable]=false>
									<ng-option *ngFor="let item of fileType"
										[value]="item.value">{{item.label}}</ng-option>
								</ng-select>
								<div *ngIf="selectedFileTypeRef.errors && selectedFileTypeRef.errors['required'] && selectedFileTypeRef.touched"
									class="error-text">
									{{"File type is required" | translate}}
								</div>
								<button class="btn btnReset" type="button" (click)="resetWithDefaults()">{{"buttons.reset" | translate}}</button>
								<button id= "submit" class="btn btnAdd" (click)="dlReport()" [disabled]="dlbuttonPerms()">{{"buttons.generate" | translate}}</button>
							</div>
						</td>
					</tr>

				</table>
		</div>
	</div>
</body>
