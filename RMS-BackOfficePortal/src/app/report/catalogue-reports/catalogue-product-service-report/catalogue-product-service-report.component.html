    <body class="BodyCointaner"  *ngIf="permViewAllow === 1">
        <div class="PAContainer73">

                <h2>{{"labels.catalogueproductservicereport" | translate}}</h2>

                    <table>

							<div class="displayColumn form-group" id="daterange-container">
								<label for="daterange">{{"labels.daterange" | translate}} <span class='RedAsterisk'>*</span></label>
								<input type="text" id="daterange" placeholder="" class="form-control"
								  [bsConfig]="{ rangeInputFormat : 'DD MMM YYYY', dateInputFormat: 'DD MMM YYYY', showWeekNumbers: false ,rangeSeparator:' to ',containerClass:'theme-default',adaptivePosition: true, maxDateRange: 365}"
								  bsDaterangepicker [(ngModel)]="productServiceDateRange" name="daterange" readonly>
								<div *ngIf="dateCheck()" class="error-text">
									{{"labels.invaliddaterange12months" | translate}}
								</div>
							</div>
                        </td>

                                    dropdownPosition="bottom"
                                    [(ngModel)]="typeOfService"
                                    name="typeOfService"
                                    #typeOfServiceRef="ngModel"
                                    required>
                                    <ng-option *ngFor="let status of typeOfServices" [value]="status">{{status}}</ng-option>
                                </ng-select>
                                <div *ngIf="typeOfServiceRef.errors && typeOfServiceRef.errors['required'] && typeOfServiceRef.touched" 
                                    class="error-text">
                                    {{"labels.typeofserviceisrequired" | translate}}
                                </div>
                            </div>
                        </td> -->

                            <div class="displayColumn">
                                <label>{{"labels.emailstatus" | translate}}</label>
                                <ng-select class="form-control" dropdownPosition="bottom" [(ngModel)]="emailStatus" name="emailStatus">
                                    <ng-option *ngFor="let status of emailStatuses" [value]="status">{{status}}</ng-option>
                                </ng-select>
                            </div>
                        </td> -->
                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.paymentstatus" | translate}}</label>
                                <!-- <ng-select class="form-control" dropdownPosition="bottom" [(ngModel)]="paymentStatus" name="paymentStatus">
                                    <ng-option *ngFor="let status of paymentStatuses" [value]="status">{{status}}</ng-option>

                                <ng-select 
                                class="form-control"
                                dropdownPosition="bottom"
                                [(ngModel)]="paymentStatus"
                                name="paymentStatus"
                                [items]="paymentStatuses"
                                bindLabel="nm_en"
                                bindValue="param_cd">
                            </ng-select>                                
                            </div>
                        </td>
                    <!-- </tr>
                    <tr> -->

                        <td>
                            <div class="displayColumn">
                                <label>{{"labels.entityno" | translate}}</label>
                                <input type="text" class="form-control" [(ngModel)]="entityNo" name="entityNo" maxlength="25">
                            </div>
                        </td>
                    </tr>
                    
                        <tr>
                            <td></td>
                            <td colspan="2">
                                <div class="displayRow">
                                    <label>{{"labels.downloadreportas:" | translate}}</label>
                                    <ng-select class="form-control" [(ngModel)]="selectedFileType" name="selectedFileType"
                                        dropdownPosition="bottom" #selectedFileTypeRef="ngModel" required [clearable]=false>
                                        <ng-option *ngFor="let item of fileType"
                                            [value]="item.value">{{item.label}}</ng-option>
                                    </ng-select>
                                    <div *ngIf="selectedFileTypeRef.errors && selectedFileTypeRef.errors['required'] && selectedFileTypeRef.touched"
                                        class="error-text">
                                        {{"File type is required" | translate}}
                                    </div>
                                    <button class="btn btnReset" type="button" (click)="resetWithDefaults()">{{"buttons.reset" | translate}}</button>
                                    <button id= "submit" class="btn btnAdd" (click)="downloadReport()" [disabled]="dlbuttonPerms()">{{"buttons.generate" | translate}}</button>
                                </div>
                            </td>
                        </tr>
                    </table>

            </div>
        </div>
