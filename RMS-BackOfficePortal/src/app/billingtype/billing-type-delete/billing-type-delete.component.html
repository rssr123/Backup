<div class="SingleContainer">
    <!-- Header for Delete Billing Type -->
    <div class="SingleContainerHeader">
      <h2 class="text-center">Delete Billing Type</h2>
    </div>
    <form (ngSubmit)="deleteBillingType()">
      <div class="MALoadingContainer">
        <!-- Loading spinner overlay -->
        <div *ngIf="isLoading" class="TableLoading-overlay d-flex align-items-center justify-content-center">
          <div class="spinner-border" role="status">
            <span class="sr-only"></span>
          </div>
        </div>
        <div [ngClass]="{'TableDimmed': isLoading}">
          <!-- Error Box -->
          <div *ngIf="error" class="error-box">
            <i class="bi bi-x-circle-fill error-icon"></i>
            <div>
              <strong>Validation Error</strong>
              <ul>
                <li *ngFor="let errorMsg of errorMessages">{{ errorMsg }}</li>
              </ul>
            </div>
          </div>
          <!-- Confirmation Message -->
          <div class="form-group">
            <label>Are you sure you want to delete the billing type <strong>{{ billingTypeId }}</strong>?</label>
          </div>
  
          <!-- Buttons -->
          <div class="button-group">
            <button class="btn btnDelete" type="submit">Delete</button>
            <button class="btn btnClose" type="button" (click)="close()">Close</button>
          </div>
        </div>
      </div>
    </form>
  </div>
